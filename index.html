<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Hệ thống phần mềm quản trị đổi mới sáng tạo" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap"
      rel="stylesheet">
    <title>Đổi mới sáng tạo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.css" />
    <link rel="shortcut icon" href="media/logos/logo.png" />
    <link rel="stylesheet" id="layout-styles-anchor" href="/splash-screen.css" />
  </head>

  <body id="kt_body" class="page-loading">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <!--begin::Theme mode setup on page load-->
    <script>
      let themeMode = 'system';

      if (localStorage.getItem('kt_theme_mode_value')) {
        themeMode = localStorage.getItem('kt_theme_mode_value');
      }

      if (themeMode === 'system') {
        themeMode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }

      document.documentElement.setAttribute('data-bs-theme', themeMode);
    </script>
    <!--end::Theme mode setup on page load-->

    <div id="root"></div>

    <!--begin::Loading markup-->
    <div id="splash-screen" class="splash-screen">
      <img src="/media/logos/logo-loading.png" height="70px"  class="dark-logo" alt="Logo" />
      <img src="/media/logos/logo-loading.png" height="70px" class="light-logo" alt="Logo" />
      <div class="loader-wrapper">
        <span class="loader"></span>
        <span class="loading-text">Loading...</span>
      </div>
    </div>
    <!--end::Loading markup-->

    <div id="root-modals"></div>
    <!-- jsTree JS -->
    <script src="/plugin/jquery.min.js"></script>
    <script src="/plugin/jstree.min.js"></script>
    <script src="/plugin/jstreetable.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
